name: Update Route I data

on:
  workflow_dispatch:
    inputs:
      force_image_refresh:
        description: "Refresh missing referenced images"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  repository_dispatch:
    types: [ten-tors-route-i-update]
  # Comment out the schedule outside the event window.
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-route-i
  cancel-in-progress: false

env:
  SOURCE_URL: https://www.tentors.org.uk/eventdata/routei.html

jobs:
  probe:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      etag: ${{ steps.check.outputs.etag }}
      last_modified: ${{ steps.check.outputs.last_modified }}
    steps:
      - name: Restore previous source metadata
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: source-meta.txt
          key: source-meta-latest
          restore-keys: source-meta-

      - name: Conditional HEAD probe
        id: check
        run: |
          set -e
          PREV_ETAG=""
          PREV_LM=""
          if [ -f source-meta.txt ]; then
            PREV_ETAG=$(sed -n '1p' source-meta.txt)
            PREV_LM=$(sed -n '2p' source-meta.txt)
          fi
          ARGS=(-sI -A "tentors26-route-i-dashboard/0.1 (+github actions)")
          [ -n "$PREV_ETAG" ] && ARGS+=(-H "If-None-Match: $PREV_ETAG")
          [ -n "$PREV_LM" ] && ARGS+=(-H "If-Modified-Since: $PREV_LM")
          HEADERS=$(curl "${ARGS[@]}" "$SOURCE_URL" || true)
          CODE=$(printf '%s' "$HEADERS" | head -1 | awk '{print $2}')
          NEW_ETAG=$(printf '%s' "$HEADERS" | awk 'BEGIN{IGNORECASE=1}/^etag:/{sub(/^[^:]*: */,""); sub(/\r$/,""); print; exit}')
          NEW_LM=$(printf '%s' "$HEADERS" | awk 'BEGIN{IGNORECASE=1}/^last-modified:/{sub(/^[^:]*: */,""); sub(/\r$/,""); print; exit}')
          printf '%s\n%s\n' "${NEW_ETAG:-$PREV_ETAG}" "${NEW_LM:-$PREV_LM}" > source-meta.txt
          echo "etag=$NEW_ETAG" >> "$GITHUB_OUTPUT"
          echo "last_modified=$NEW_LM" >> "$GITHUB_OUTPUT"
          # Forced runs always proceed.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Forced run (event=${{ github.event_name }}); proceeding."
            exit 0
          fi
          if [ "$CODE" = "304" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Source unchanged (304). Skipping update."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Source changed (HTTP $CODE). Proceeding."
          fi

      - name: Save source metadata
        if: always()
        uses: actions/cache/save@v4
        with:
          path: source-meta.txt
          key: source-meta-${{ github.run_id }}

  update:
    needs: probe
    if: needs.probe.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts
            site
            .github

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater (no npm install — uses vendored parser bundle)
        env:
          TEAM_CODE: IF
          REQUESTED_NAME: "Polar Explorer Scouts"
          STRIDE_METRES: "0.76"
          FORCE_IMAGE_REFRESH: ${{ inputs.force_image_refresh || 'false' }}
        run: node scripts/update-route-i-data.mjs

      - name: Commit changes if any
        run: |
          git config user.name "tentors26-bot"
          git config user.email "tentors26-bot@users.noreply.github.com"
          git add site/data.json site/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data: update Route I snapshot ($(date -u +%FT%TZ))"
          for i in 1 2 3 4; do
            git push && exit 0
            sleep $((2 ** i))
          done
          git push
