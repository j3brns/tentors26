name: Update Route I data

on:
  workflow_dispatch:
    inputs:
      force_image_refresh:
        description: "Refresh missing referenced images"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  repository_dispatch:
    types: [ten-tors-route-i-update]
  # Comment out the schedule outside the event window.
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-route-i
  cancel-in-progress: false

env:
  SOURCE_URL: https://www.tentors.org.uk/eventdata/routei.html

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            scripts
            site
            .github

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater (no npm install — uses vendored parser bundle)
        env:
          TEAM_CODE: IF
          REQUESTED_NAME: "Polar Explorer Scouts"
          STRIDE_METRES: "0.76"
          FORCE_IMAGE_REFRESH: ${{ inputs.force_image_refresh || 'false' }}
        run: node scripts/update-route-i-data.mjs

      - name: Commit changes if any
        run: |
          set -eo pipefail
          git config user.name "tentors26-bot"
          git config user.email "tentors26-bot@users.noreply.github.com"

          # Stash the freshly produced data outside the working tree so we can
          # safely hard-reset to whatever main looks like right now.
          tmp=$(mktemp -d)
          cp site/data.json "$tmp/data.json"
          cp site/history.json "$tmp/history.json"

          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin main
            git checkout -B main origin/main
            cp "$tmp/data.json" site/data.json
            cp "$tmp/history.json" site/history.json
            git add site/data.json site/history.json
            if git diff --cached --quiet; then
              echo "No changes to commit (attempt $i)."
              exit 0
            fi
            git commit -m "data: update Route I snapshot ($(date -u +%FT%TZ))"
            if git push origin main; then
              exit 0
            fi
            echo "push attempt $i rejected; will re-anchor on origin/main"
            sleep $((i * 3))
          done
          echo "::error::push failed after retries" >&2
          exit 1
